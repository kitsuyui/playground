name: TODO Metrics

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  todo-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Count TODOs in current revision
        run: |
          mkdir -p .tmp/todo-metrics
          python scripts/todo_metrics.py count --output .tmp/todo-metrics/current.json
          python scripts/todo_metrics.py badge --input .tmp/todo-metrics/current.json --output .tmp/todo-metrics/todo-badge.svg

      - name: Count TODOs at merge base
        if: github.event_name == 'pull_request'
        id: merge_base
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch origin "${BASE_REF}" --depth=1
          merge_base="$(git merge-base HEAD "origin/${BASE_REF}")"
          echo "merge_base=${merge_base}" >> "$GITHUB_OUTPUT"
          python scripts/todo_metrics.py count --rev "${merge_base}" --output .tmp/todo-metrics/base.json

      - name: Comment TODO delta on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          BASE_JSON: .tmp/todo-metrics/base.json
          CURRENT_JSON: .tmp/todo-metrics/current.json
          MERGE_BASE: ${{ steps.merge_base.outputs.merge_base }}
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- todo-metrics-comment -->";
            const base = JSON.parse(fs.readFileSync(process.env.BASE_JSON, "utf8"));
            const current = JSON.parse(fs.readFileSync(process.env.CURRENT_JSON, "utf8"));
            const delta = current.count - base.count;
            const deltaLabel = delta > 0 ? `+${delta}` : `${delta}`;
            const body = [
              marker,
              "## TODO metrics",
              "",
              `- Base (${process.env.MERGE_BASE.slice(0, 7)}): ${base.count}`,
              `- Head (${current.reference.slice(0, 7)}): ${current.count}`,
              `- Delta: ${deltaLabel}`,
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Upload TODO count artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: todo-count.json
          path: .tmp/todo-metrics/current.json
          archive: false
          retention-days: 30

      - name: Upload TODO badge artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: todo-badge.svg
          path: .tmp/todo-metrics/todo-badge.svg
          archive: false
          retention-days: 30

      - name: Publish badge assets branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ASSET_BRANCH: badge-assets
        run: |
          mkdir -p .tmp/badge-assets
          cp .tmp/todo-metrics/current.json .tmp/badge-assets/current.json
          cp .tmp/todo-metrics/todo-badge.svg .tmp/badge-assets/todo-badge.svg

          if git ls-remote --exit-code origin "${ASSET_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${ASSET_BRANCH}" --depth=1
            git worktree add .tmp/badge-assets-worktree "origin/${ASSET_BRANCH}"
          else
            git worktree add --detach .tmp/badge-assets-worktree
            cd .tmp/badge-assets-worktree
            git checkout --orphan "${ASSET_BRANCH}"
            git rm -rf --ignore-unmatch .
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            cd -
          fi

          cp .tmp/badge-assets/current.json .tmp/badge-assets-worktree/current.json
          cp .tmp/badge-assets/todo-badge.svg .tmp/badge-assets-worktree/todo-badge.svg

          cd .tmp/badge-assets-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current.json todo-badge.svg
          if git diff --cached --quiet; then
            echo "No asset changes to publish."
            exit 0
          fi
          git commit -m "Update TODO badge assets"
          git push origin HEAD:"${ASSET_BRANCH}"
